spring:
  application:
    name: jizhang
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bill_manager?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
  
  session:
    store-type: memory
    timeout: 30m

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.billmanager.jizhang.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /jizhang
    session:
      cookie:
        secure: false
        http-only: true
        max-age: 1800

logging:
  level:
    com.billmanager.jizhang: debug
    org.springframework.security: debug

