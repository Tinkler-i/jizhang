<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人记账系统 - 登录</title>
    <link rel="stylesheet" href="/jizhang/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">个人记账系统</h1>
            <p class="login-subtitle">欢迎回来，请登录您的账户</p>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                    <span class="error-message" id="usernameError"></span>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                    <span class="error-message" id="passwordError"></span>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span>记住我</span>
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">登录</span>
                    <span class="btn-loading" style="display: none;">登录中...</span>
                </button>
            </form>
            
            <div class="login-footer">
                <p>还没有账户？<a href="#" class="register-link">立即注册</a></p>
            </div>
            
            <div id="alertMessage" class="alert-message"></div>
        </div>
    </div>
    
    <script src="/jizhang/js/login.js"></script>
</body>
</html>
