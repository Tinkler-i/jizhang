<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>会话测试工具</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section { margin-bottom: 30px; }
        .section h2 { color: #333; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        button { padding: 10px 20px; margin: 5px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #764ba2; }
        #output { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 4px; min-height: 100px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 13px; max-height: 400px; overflow-y: auto; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .info { color: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 会话持久化测试工具</h1>
        
        <div class="section">
            <h2>1️⃣ 登录测试</h2>
            <button onclick="testLogin()">发送登录请求 (POST /api/login)</button>
            <div id="output"></div>
        </div>
        
        <div class="section">
            <h2>2️⃣ 访问受保护页面</h2>
            <p>确保登录后再测试以下页面</p>
            <button onclick="testPage('/income')">访问 /income</button>
            <button onclick="testPage('/income-category')">访问 /income-category</button>
            <button onclick="testPage('/dashboard')">访问 /dashboard</button>
        </div>
        
        <div class="section">
            <h2>3️⃣ API 测试</h2>
            <button onclick="testAPI('/api/income-category')">GET /api/income-category</button>
            <button onclick="testAPI('/api/income')">GET /api/income</button>
        </div>
        
        <div class="section">
            <h2>4️⃣ 会话信息</h2>
            <button onclick="showSessionInfo()">显示Cookie和会话信息</button>
        </div>
    </div>
    
    <script>
        const baseUrl = '/jizhang';
        
        function log(msg, type = 'info') {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const className = type === 'success' ? 'success' : type === 'error' ? 'error' : 'info';
            output.innerHTML += `<div class="${className}">[${timestamp}] ${msg}</div>`;
            output.scrollTop = output.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('output').innerHTML = '';
        }
        
        async function testLogin() {
            clearLog();
            log('📤 正在发送登录请求...', 'info');
            
            try {
                const response = await fetch(`${baseUrl}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                log(`响应状态: ${response.status}`, 'info');
                
                if (!response.ok) {
                    log(`❌ 登录失败!`, 'error');
                    const text = await response.text();
                    log(`响应: ${text.substring(0, 200)}`, 'error');
                    return;
                }
                
                const data = await response.json();
                if (data.code === 200) {
                    log(`✅ 登录成功!`, 'success');
                    log(`用户: ${data.data.username}`, 'success');
                    log(`ID: ${data.data.id}`, 'success');
                    showSessionInfo();
                } else {
                    log(`❌ 登录失败: ${data.message}`, 'error');
                }
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
        }
        
        async function testPage(path) {
            clearLog();
            log(`📄 正在访问 ${path}...`, 'info');
            
            try {
                const response = await fetch(`${baseUrl}${path}`, {
                    credentials: 'include'
                });
                
                log(`响应状态: ${response.status}`, 'info');
                
                if (response.status === 200) {
                    const html = await response.text();
                    log(`✅ 页面加载成功!`, 'success');
                    log(`页面大小: ${html.length} 字节`, 'success');
                    if (html.includes('<html')) {
                        log(`✓ 检测到有效的HTML内容`, 'success');
                    }
                } else if (response.status === 302 || response.status === 307) {
                    log(`⚠️ 页面重定向 (${response.status})`, 'error');
                    log(`检测到重定向，可能会话已失效`, 'error');
                } else {
                    log(`❌ 错误: 服务器返回 ${response.status}`, 'error');
                }
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
        }
        
        async function testAPI(path) {
            clearLog();
            log(`🔗 正在调用 ${path}...`, 'info');
            
            try {
                const response = await fetch(`${baseUrl}${path}`, {
                    credentials: 'include'
                });
                
                log(`响应状态: ${response.status}`, 'info');
                
                if (response.status === 200) {
                    const data = await response.json();
                    if (data.code === 200) {
                        log(`✅ API调用成功!`, 'success');
                        log(`返回数据项数: ${data.data.length}`, 'success');
                        log(`完整响应: ${JSON.stringify(data, null, 2)}`, 'info');
                    } else {
                        log(`❌ API错误: ${data.message}`, 'error');
                        log(`响应代码: ${data.code}`, 'error');
                    }
                } else {
                    log(`❌ HTTP错误: ${response.status}`, 'error');
                    const text = await response.text();
                    log(`响应预览: ${text.substring(0, 200)}`, 'error');
                }
            } catch (e) {
                log(`❌ 错误: ${e.message}`, 'error');
            }
        }
        
        function showSessionInfo() {
            clearLog();
            const cookies = document.cookie;
            log(`📋 当前Cookie列表:`, 'info');
            if (cookies) {
                cookies.split('; ').forEach(cookie => {
                    const [name, value] = cookie.split('=');
                    log(`  • ${name} = ${value.substring(0, 30)}...`, 'info');
                });
            } else {
                log(`  (无Cookie)`, 'error');
            }
            
            const jsessionid = getCookie('JSESSIONID');
            log(``, 'info');
            if (jsessionid) {
                log(`✅ JSESSIONID 已设置: ${jsessionid.substring(0, 30)}...`, 'success');
            } else {
                log(`❌ JSESSIONID 未找到!`, 'error');
            }
        }
        
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
    </script>
</body>
</html>
